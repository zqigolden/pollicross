<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer grid boundary -->
  <rect width="100" height="100" rx="15" fill="#1e1e38" stroke="#00f0ff" stroke-width="6"/>
  <!-- Subdivided grid lines -->
  <line x1="33.3" y1="0" x2="33.3" y2="100" stroke="#00f0ff" stroke-width="2" stroke-opacity="0.3"/>
  <!-- Bold midline -->
  <line x1="50" y1="0" x2="50" y2="100" stroke="#00f0ff" stroke-width="4" stroke-opacity="0.7"/>
  <line x1="66.6" y1="0" x2="66.6" y2="100" stroke="#00f0ff" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="0" y1="33.3" x2="100" y2="33.3" stroke="#00f0ff" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="0" y1="50" x2="100" y2="50" stroke="#00f0ff" stroke-width="4" stroke-opacity="0.7"/>
  <line x1="0" y1="66.6" x2="100" y2="66.6" stroke="#00f0ff" stroke-width="2" stroke-opacity="0.3"/>
  <!-- Colored active cells (pixel pattern) -->
  <rect x="10" y="10" width="15" height="15" rx="3" fill="#ff007f"/>
  <rect x="75" y="10" width="15" height="15" rx="3" fill="#ff007f"/>
  <rect x="42.5" y="42.5" width="15" height="15" rx="3" fill="#00f0ff"/>
  <rect x="10" y="75" width="15" height="15" rx="3" fill="#ff007f"/>
  <rect x="75" y="75" width="15" height="15" rx="3" fill="#ff007f"/>
</svg>
